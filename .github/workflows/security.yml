# Fortify security gate for this repo.
# Generated from .claude/skills/fortify/templates/ci-workflow.yml and adapted:
# the intentionally-vulnerable demo fixtures (demo-app/) are EXCLUDED from SAST
# and secret scanning so the gate stays meaningful for real code. Remove those
# excludes when adapting this workflow for a normal project.
#
# SUPPLY-CHAIN NOTE: for production, pin every `uses:` to a full commit SHA.

name: security

"on":
  pull_request:
  push:
    branches: [main, master]
  schedule:
    - cron: "0 6 * * 1"   # weekly re-scan

permissions:
  contents: read
  security-events: write

jobs:
  fortify-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Secret scan — demo-app/ is allowlisted via .gitleaks.toml
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Static analysis (SAST) — exclude the intentionally-vulnerable demo
      - name: Semgrep SAST
        run: |
          python -m pip install semgrep
          semgrep scan --error \
            --config p/owasp-top-ten \
            --config p/security-audit \
            --config p/secrets \
            --exclude demo-app \
            --sarif --output semgrep.sarif || true

      - name: Upload SARIF to code scanning
        if: ${{ always() && hashFiles('semgrep.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif

  gate:
    needs: fortify-scan
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Report gate result
        run: |
          if [ "${{ needs.fortify-scan.result }}" != "success" ]; then
            echo "Security gate failed — review findings above."
            exit 1
          fi
          echo "Security gate passed."
